plugins {
    id 'java'
    id 'com.gradleup.shadow' version '9.4.1'
}

repositories {
    mavenCentral()
    maven { url 'https://repo.papermc.io/repository/maven-public/' }
}

dependencies {
    compileOnly 'io.papermc.paper:paper-api:1.21.11-R0.1-SNAPSHOT'
    implementation 'org.spongepowered:configurate-hocon:4.1.2'
}

group = 'de.bluecolored.rottenfood'
version = '2.0'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

shadowJar {
    relocate 'org.spongepowered.configurate', 'de.bluecolored.rottenfood.libs.configurate'
    relocate 'com.typesafe.config', 'de.bluecolored.rottenfood.libs.typesafe'
    relocate 'io.leangen.geantyref', 'de.bluecolored.rottenfood.libs.geantyref'
    archiveClassifier.set('')
}

tasks.named('build') {
    dependsOn shadowJar
}
